<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log in</title>
        <link rel="stylesheet" href="style.css">
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
        </style>
    </head>

    <body>
        <div class="horizontally-centered-container">
            <img src="/Images/Logo With Shadow.png" alt="Logo" style="width: 100px; height: 100px; margin-bottom: 20px;">
            <form>
                    <h1>Log in</h1>
                    <div class="form-container">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="example@gmail.com" required><br><br>
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required><br><br>
                        <input type="submit" value="Log In">
                    </div>
                    <br>
                    <p style="font-size: 14px; font-weight: 400;">Want to sign up first? <a href="/signUp.html" style="color: rgb(41, 112, 255); font-weight: 600;">Sign up<p>
                </form>
                <!-- <h6>Tip: No AI was used in the creation of this page 🫡</h6> -->
        </div>
    </body>
</html>
