<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up</title>
        <script src="navBarTemplateSetter.js" defer></script>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="sign-up.css">
    </head>
    <body>
        <div class="horizontally-centered-container">
            <img src="/Images/Logo With Shadow.png" alt="Logo" style="width: 100px; height: 100px; margin-bottom: 15px;">
        <form>
            <h1>Sign Up</h1>
            <div class="form-container">
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname" required placeholder="John"><br><br>

            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lname" required placeholder="Appleseed"><br><br>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required placeholder="john_appleseed"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="example@gmail.com"><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>

            <input type="submit" value="Sign Up">
            </div>
            <br>
            <p style="font-size: 14px; font-weight: 400;">Looking for the log in page? <a href="/login.html" style="color: rgb(41, 112, 255); font-weight: 600;">Log in</a></p>
        </form>
        </div>

    </body>
</html>
