<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternMap</title>
</head>
<body>
   
    <div class="form">
        <img src="Logo.png" alt="InternMap Logo" class="logo" style="width: 250px; height: auto;">

                <label hidden>Email: </label>
                <input type="email" name="email" placeholder="Email" class="field">

                <input type="password" name="password" placeholder="Password" class="field">

                <input type="submit" value="Sign in" class="prominentButton">
            </form>
    </div>
</body>
</html>
