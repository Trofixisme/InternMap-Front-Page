<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternMap</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <div class="form">
        <img src="Logo.png" alt="InternMap Logo" class="logo" style="width: 250px; height: auto;">
            <form id="container">
                <label hidden>Email: </label>
                <input type="email" name="email" placeholder="Email" class="field">
                <label hidden>Password:</label>
                <input type="password" name="password" placeholder="Password" class="field">
                <br> 
                <input type="submit" value="Sign in" class="prominentButton">
            </form>
    </div>
</body>
</html>
